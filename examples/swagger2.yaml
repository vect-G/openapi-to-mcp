swagger: '2.0'
info:
  title: Legacy Store API
  version: 1.0.0
host: api.example.com
basePath: /v1
schemes: [https]
paths:
  /orders:
    post:
      operationId: createOrder
      consumes: [application/json]
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required: [product_id]
            properties:
              product_id:
                type: string
              quantity:
                type: integer
      responses:
        '201':
          description: Created

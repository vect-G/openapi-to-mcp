openapi: 3.0.3
info:
  title: Tiny Store API
  version: 1.0.0
servers:
  - url: https://api.example.com/v1
paths:
  /products:
    get:
      operationId: listProducts
      summary: List products
      tags: [products]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Product list
  /orders/{id}:
    get:
      operationId: getOrder
      summary: Get one order
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order found
  /orders:
    post:
      operationId: createOrder
      summary: Create order
      tags: [orders, write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id, quantity]
              properties:
                product_id:
                  type: string
                quantity:
                  type: integer
      responses:
        '201':
          description: Created
  /internal/health:
    get:
      operationId: internalHealth
      summary: Internal health check
      tags: [internal]
      responses:
        '200':
          description: OK
